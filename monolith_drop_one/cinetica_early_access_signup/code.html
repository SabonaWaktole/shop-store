<style>
        /* Scanner Animation */
        @keyframes scanner {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: theme('colors.primary');
            box-shadow: 0 0 10px theme('colors.primary');
            animation: scanner 4s infinite linear;
            z-index: 10;
            pointer-events: none;
        }

        /* Custom Input Styles */
        .cinetica-input {
            border: none;
            border-bottom: 1px solid theme('colors.outline-variant');
            background: transparent;
            color: theme('colors.primary');
            border-radius: 0;
            padding: 0.5rem 0;
            transition: border-color 0.3s ease;
        }
        .cinetica-input:focus {
            outline: none;
            box-shadow: none;
            border-bottom-color: theme('colors.primary');
        }
        .cinetica-input:invalid:not(:placeholder-shown) {
            border-bottom-color: theme('colors.secondary-container'); /* Flash of high contrast silver for error */
        }
        
        /* Grid Lines */
        .grid-line-v { border-right: 1px solid theme('colors.outline-variant'); }
        .grid-line-h { border-bottom: 1px solid theme('colors.outline-variant'); }
        
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-main antialiased selection:bg-primary selection:text-background relative overflow-hidden bg-noise">
<!-- TopNavBar: Linear/Transactional Intent -> Suppressed per JSON logic -->
<!-- Main Content Area - Cinematic Brutalism -->
<main class="flex-grow flex items-center justify-center relative w-full h-screen p-margin-mobile md:p-margin-desktop z-10">
<!-- Hero Background Image Container with Scanner -->
<div class="absolute inset-0 w-full h-full z-0 overflow-hidden">
<div class="absolute inset-0 bg-background/80 z-10 mix-blend-multiply"></div> <!-- Void Stacking -->
<img class="w-full h-full object-cover filter grayscale contrast-125 opacity-30 object-center" data-alt="A stark, high-contrast, black and white extreme close-up of a futuristic brushed metal mechanism or high-end technical fabric. The lighting is harsh and cinematic, casting deep, aggressive shadows. The composition is unbalanced, emphasizing negative space and sharp, brutalist lines. The mood is cold, exclusive, and industrial, fitting a dystopian fashion brand from 2093." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7WdURs0paQogpdnv7VlPc1DSkoOHsIanxF3NcfnuKJgiQ5wR9jvWzZWZngjKFmdpVB67m5A9GYVDLKwPzqXcSWvYPPdtzLi9GRIuiJxVORF5qryiJMJYKOqcBAdY1iitAvNNSv8vH7XFlak3Rp_-OzUny9_JPGK_ec3UxV7d3q-oo3vA78YhM76-cXSzRVNGKRrWKwsSN5mwVohLo_lhM2NtMkRe3k2l4T8u9gqGHEgofdJz2OHbjekMS2AVjnjGmKDR5HtHY5te5"/>
<div class="scanner-line"></div>
</div>
<!-- The Signup Modal / Container -->
<div class="relative z-20 w-full max-w-2xl bg-surface/90 backdrop-blur-3xl border border-outline-variant p-8 md:p-16 flex flex-col gap-12">
<!-- Grid Lines inside the box -->
<div class="absolute top-0 left-0 w-full h-[1px] bg-outline-variant"></div>
<div class="absolute bottom-0 left-0 w-full h-[1px] bg-outline-variant"></div>
<div class="absolute top-0 left-0 w-[1px] h-full bg-outline-variant"></div>
<div class="absolute top-0 right-0 w-[1px] h-full bg-outline-variant"></div>
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-outline-variant/30 pointer-events-none"></div>
<div class="absolute top-0 left-1/2 w-[1px] h-full bg-outline-variant/30 pointer-events-none"></div>
<!-- Header Section -->
<div class="text-center space-y-6 relative z-10">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary uppercase tracking-widest">
                    ACCESS THE DROP 001
                </h1>
<div class="w-12 h-[1px] bg-primary mx-auto"></div>
<p class="font-body-main text-body-main text-on-surface-variant max-w-md mx-auto">
                    Join the list for early access and exclusive drops.
                </p>
</div>
<!-- Form Section -->
<form class="space-y-8 relative z-10" id="joinListForm" onsubmit="event.preventDefault(); handleFormSubmit();">
<div class="space-y-6">
<!-- Email Field -->
<div class="flex flex-col relative group">
<label class="font-label-mono text-label-mono text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors" for="email">
                            EMAIL ADDRESS
                        </label>
<input class="cinetica-input font-label-mono text-label-mono w-full focus:ring-0" id="email" name="email" placeholder=" " required="" type="email"/>
</div>
<!-- Mobile Number Field -->
<div class="flex flex-col relative group">
<label class="font-label-mono text-label-mono text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors" for="mobile">
                            MOBILE NUMBER
                        </label>
<input class="cinetica-input font-label-mono text-label-mono w-full focus:ring-0" id="mobile" name="mobile" placeholder=" " required="" type="tel"/>
</div>
</div>
<!-- Submit CTA -->
<button class="w-full bg-primary text-on-primary font-label-mono text-label-mono py-5 uppercase tracking-[0.2em] transition-all duration-300 hover:bg-background hover:text-primary hover:outline hover:outline-1 hover:outline-primary relative overflow-hidden group" type="submit">
<span class="relative z-10">GET ACCESS</span>
<!-- Hover Effect Background -->
<div class="absolute inset-0 bg-background transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300 ease-out z-0"></div>
<span class="relative z-10 mix-blend-difference text-primary group-hover:text-primary transition-colors delay-100">GET ACCESS</span>
</button>
<!-- Small Print -->
<p class="font-caption text-caption text-on-surface-variant text-center mt-4">
                    BY SUBMITTING, YOU AGREE TO OUR TERMS AND PRIVACY POLICY.
                </p>
</form>
<!-- Success State (Hidden initially) -->
<div class="hidden absolute inset-0 bg-surface/95 backdrop-blur-xl flex-col items-center justify-center p-8 text-center z-50 border border-outline-variant" id="successState">
<span class="material-symbols-outlined text-display-xl text-primary mb-6 animate-pulse" style="font-variation-settings: 'FILL' 1;">done_all</span>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary uppercase mb-4">ACCESS GRANTED</h2>
<p class="font-label-mono text-label-mono text-on-surface-variant tracking-widest">TRANSMISSION SECURED.</p>
</div>
</div>
</main>
<!-- Footer: Linear/Transactional Intent -> Suppressed to keep focus on the form -->
<script>
        function handleFormSubmit() {
            const form = document.getElementById('joinListForm');
            const successState = document.getElementById('successState');
            
            // Simple validation simulation
            if(form.checkValidity()) {
                // Show success state
                successState.classList.remove('hidden');
                successState.classList.add('flex');
            } else {
                form.reportValidity();
            }
        }
    </script>
</body></html>
