<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CINETICA - Cart Drawer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {

                        "on-tertiary": "#2f3131",

                        "error-container": "#93000a",
                        "surface-dim": "#131314",
                        "on-secondary-fixed-variant": "#474747",
                        "primary": "#ffffff",
                        "primary-container": "#e2e2e2",
                        "on-surface": "#e5e2e3",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#353436",
                        "tertiary-container": "#e3e2e2",
                        "on-surface-variant": "#c4c7c8",
                        "on-secondary-container": "#b5b5b5",
                        "surface-variant": "#353436",
                        "on-secondary-fixed": "#1b1b1b",
                        "on-primary-fixed": "#1a1c1c",
                        "on-background": "#e5e2e3",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-primary": "#2f3131",
                        "surface": "#131314",
                        "secondary": "#c6c6c6",
                        "inverse-on-surface": "#303031",
                        "inverse-surface": "#e5e2e3",
                        "background": "#131314",
                        "inverse-primary": "#5d5f5f",
                        "surface-bright": "#39393a",
                        "surface-container-high": "#2a2a2b",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#1b1b1c",

                        "outline-variant": "#444748",
                        "surface-tint": "#c6c6c7",
                        "tertiary-fixed-dim": "#c7c6c6",
                        "outline": "#8e9192",
                        "tertiary": "#ffffff",
                        "primary-fixed": "#e2e2e2",
                        "on-secondary": "#303030",
                        "secondary-fixed": "#e2e2e2",
                        "primary-fixed-dim": "#c6c6c7",
                        "on-primary-container": "#636565",
                        "secondary-fixed-dim": "#c6c6c6",

                        "secondary-container": "#474747"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "unit": "4px",
                        "margin-desktop": "60px",
                        "margin-mobile": "20px",
                        "gutter": "1px",
                        "container-max": "1920px"
                    },
                    fontFamily: {
                        "display-xl": ["Inter", "sans-serif"],
                        "body-main": ["Inter", "sans-serif"],
                        "caption": ["Inter", "sans-serif"],
                        "headline-lg-mobile": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "label-mono": ["Geist", "monospace"]
                    },
                    fontSize: {
                        "display-xl": ["80px", { lineHeight: "100%", letterSpacing: "0.1em", fontWeight: "900" }],
                        "body-main": ["16px", { lineHeight: "160%", letterSpacing: "0.01em", fontWeight: "400" }],
                        "caption": ["11px", { lineHeight: "140%", letterSpacing: "0.02em", fontWeight: "400" }],
                        "headline-lg-mobile": ["32px", { lineHeight: "110%", letterSpacing: "0.05em", fontWeight: "700" }],
                        "headline-lg": ["48px", { lineHeight: "110%", letterSpacing: "0.05em", fontWeight: "700" }],
                        "label-mono": ["12px", { lineHeight: "100%", letterSpacing: "0.15em", fontWeight: "500" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base typography reset to ensure Inter/Geist load if available */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* Custom scrollbar for brutalist aesthetic */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #131314; /* background color */
        }
        ::-webkit-scrollbar-thumb {
            background: #444748; /* outline-variant */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffffff; /* primary */
        }
    </style>
</head>
<body class="bg-background text-primary antialiased min-h-screen relative overflow-hidden">
<!-- Mock Background Content to show context -->
<div class="absolute inset-0 z-0 flex items-center justify-center opacity-20 pointer-events-none">
<h1 class="font-display-xl text-display-xl text-surface-container-highest uppercase tracking-widest text-center">
            CINETICA<br/>2093
        </h1>
</div>
<!-- TopNavBar (from Brand Anchors) -->
<nav class="fixed top-0 w-full z-10 bg-background/90 backdrop-blur-xl border-b border-outline-variant flex justify-between items-center h-20 px-margin-desktop">
<div class="flex items-center gap-8">
<span class="font-display-xl text-[24px] tracking-widest text-primary font-black uppercase">CINETICA</span>
</div>
<div class="hidden md:flex gap-12">
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">SHOP</a>
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">COLLECTIONS</a>
<a class="font-label-mono text-label-mono text-on-surface-variant hover:text-primary transition-colors duration-300" href="#">CAMPAIGN</a>
</div>
<div class="flex gap-6">
<button class="text-primary hover:opacity-70 transition-opacity"><span class="material-symbols-outlined">search</span></button>
<button class="text-primary hover:opacity-70 transition-opacity"><span class="material-symbols-outlined">person</span></button>
<button class="text-primary hover:opacity-70 transition-opacity border-b border-primary pb-1"><span class="material-symbols-outlined">shopping_bag</span></button>
</div>
</nav>
<!-- Overlay Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-background/80 backdrop-blur-[30px] z-40 transition-opacity duration-500"></div>
<!-- Cart Drawer -->
<aside class="fixed inset-y-0 right-0 w-full md:w-[540px] bg-background border-l border-outline-variant z-50 flex flex-col shadow-2xl transform translate-x-0 transition-transform duration-500 ease-out">
<!-- Drawer Header -->
<header class="flex justify-between items-center p-8 md:p-12 border-b border-outline-variant shrink-0">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary uppercase tracking-widest">
                CART <span class="text-on-surface-variant font-normal text-xl ml-2">(2)</span>
</h2>
<button class="text-on-surface-variant hover:text-primary transition-colors hover:scale-95 transform duration-300 flex items-center justify-center p-2 border border-transparent hover:border-outline-variant">
<span class="material-symbols-outlined" style="font-size: 28px;">close</span>
</button>
</header>
<!-- Shipping Progress -->
<div class="px-8 md:px-12 py-8 border-b border-outline-variant shrink-0 bg-surface">
<div class="flex justify-between items-end mb-4">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase">Shipping Tier</span>
<span class="font-label-mono text-label-mono text-primary uppercase">$45 AWAY FROM SECURE DELIVERY</span>
</div>
<!-- Minimal Progress Bar: 1px line -->
<div class="w-full h-gutter bg-surface-container-highest relative">
<div class="absolute top-0 left-0 h-full bg-primary w-[75%] transition-all duration-1000 ease-out"></div>
</div>
</div>
<!-- Item List -->
<div class="flex-1 overflow-y-auto">
<!-- Item 1 -->
<div class="flex gap-6 p-8 md:p-12 border-b border-outline-variant group relative overflow-hidden">
<!-- Hover scan line effect (Cinematic Brutalism) -->
<div class="absolute inset-x-0 top-0 h-gutter bg-primary opacity-0 group-hover:opacity-100 transform -translate-y-full group-hover:translate-y-[200px] transition-all duration-1000 ease-linear pointer-events-none z-10"></div>
<div class="w-28 h-36 md:w-32 md:h-40 shrink-0 bg-surface-container relative">
<img class="w-full h-full object-cover filter grayscale group-hover:grayscale-0 transition-all duration-500" data-alt="A stark, high-contrast editorial fashion photograph of a futuristic obsidian black trench coat, featuring sharp geometric cuts and metallic silver hardware. Shot on a pure white void background under harsh, cold studio lighting. The aesthetic is purely cinematic brutalism from the year 2093, feeling utilitarian yet immensely premium." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUUTk5MvbKcMcACFnaW3cb0njlZAHsWU28GDk4ovz5y4AXG4H7dQYTHdkTm-b8R6OdiLVQcDsUADfpB1Z_ukRc3HmiV8MleN2r2SXTOhReUvEltpbYsp-ymJ5yeQcUUg5hUovjlFVRrLPY_yEnGLrHAGjAfUNrPUxkCGseQmGj31mPTCRMk0O8StcSoCGjQvlTLqklwb5EqRCMf6Hs9PrT3vTgPf6c51u-p_fJZwF5a8NETdxOi9NG0ThU52dDFngmRuhoGD3fDBxu"/>
<!-- 1px outline over image -->
<div class="absolute inset-0 border border-outline-variant/30 pointer-events-none"></div>
</div>
<div class="flex flex-col justify-between flex-1 py-1">
<div class="flex justify-between items-start gap-4">
<div class="flex flex-col">
<span class="font-body-main text-body-main text-primary uppercase tracking-wider">Aero-Trench 04</span>
<span class="font-caption text-caption text-on-surface-variant mt-1">OBSIDIAN BLACK</span>
</div>
<span class="font-label-mono text-label-mono text-primary">$850</span>
</div>
<div class="flex justify-between items-end">
<div class="flex items-center gap-4">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase border border-outline-variant px-2 py-1">SIZE: 02/M</span>
<div class="flex items-center gap-3 font-label-mono text-label-mono text-primary">
<button class="text-on-surface-variant hover:text-primary transition-colors">-</button>
<span>1</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">+</button>
</div>
</div>
<button class="font-label-mono text-label-mono text-on-surface-variant hover:text-error transition-colors underline decoration-outline-variant hover:decoration-error underline-offset-4">REMOVE</button>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-6 p-8 md:p-12 border-b border-outline-variant group relative overflow-hidden">
<!-- Hover scan line effect -->
<div class="absolute inset-x-0 top-0 h-gutter bg-primary opacity-0 group-hover:opacity-100 transform -translate-y-full group-hover:translate-y-[200px] transition-all duration-1000 ease-linear pointer-events-none z-10"></div>
<div class="w-28 h-36 md:w-32 md:h-40 shrink-0 bg-surface-container relative">
<img class="w-full h-full object-cover filter grayscale group-hover:grayscale-0 transition-all duration-500" data-alt="A close-up technical product shot of a sterile white cyberpunk face mask or visor, featuring a single continuous 1px glowing silver line representing a digital sensor array. The object rests on a void-like black surface with an intense overhead spotlight casting hard shadows. The mood is cold, exclusive, and hyper-modern." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEH93NI5smNx82KVwnjWN79WoU_LVd_jA16kEHQGCI1DAPphfXxjjssor9fprsnZtgzPxvL9-qZ-S3cWawLy43JclTK63Dwh1xjWbBoI0G5aD85Zv2Zq9SteM3iLiN76FMxzyvGiKzGGRjoUP1GnUqyHNfed96W7ebDtVQ7SQjgjT2FIIhLExgLCkHiYeR0wVF25aGAz8YEjCkSCqBY4-MRF8qQm0X_u6e2DMCNAtJAduKgTm06vN06EXr8SCuLSCoRWJdujgwKu4c"/>
<!-- 1px outline over image -->
<div class="absolute inset-0 border border-outline-variant/30 pointer-events-none"></div>
</div>
<div class="flex flex-col justify-between flex-1 py-1">
<div class="flex justify-between items-start gap-4">
<div class="flex flex-col">
<span class="font-body-main text-body-main text-primary uppercase tracking-wider">Neural Visor v.2</span>
<span class="font-caption text-caption text-on-surface-variant mt-1">STERILE WHITE</span>
</div>
<span class="font-label-mono text-label-mono text-primary">$350</span>
</div>
<div class="flex justify-between items-end">
<div class="flex items-center gap-4">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase border border-outline-variant px-2 py-1">SIZE: OS</span>
<div class="flex items-center gap-3 font-label-mono text-label-mono text-primary">
<button class="text-on-surface-variant hover:text-primary transition-colors">-</button>
<span>1</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">+</button>
</div>
</div>
<button class="font-label-mono text-label-mono text-on-surface-variant hover:text-error transition-colors underline decoration-outline-variant hover:decoration-error underline-offset-4">REMOVE</button>
</div>
</div>
</div>
<!-- Spacer for scroll momentum -->
<div class="h-12"></div>
</div>
<!-- Drawer Footer (Subtotal & CTA) -->
<div class="p-8 md:p-12 border-t border-outline-variant bg-background shrink-0 mt-auto flex flex-col gap-8">
<div class="flex justify-between items-end">
<span class="font-label-mono text-label-mono text-on-surface-variant uppercase">Estimated Subtotal</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-widest">$1,200</span>
</div>
<p class="font-caption text-caption text-on-surface-variant text-center border-t border-outline-variant pt-4">
                TAXES AND SHIPPING CALCULATED AT SECURE TERMINAL.
            </p>
<!-- Large Black (Inverted) CTA per Brutalist rules -->
<button class="w-full bg-primary text-background border border-primary py-6 md:py-8 font-label-mono text-[14px] uppercase tracking-[0.2em] font-bold hover:bg-background hover:text-primary transition-all duration-300 flex justify-center items-center gap-4 group">
<span>INITIALIZE CHECKOUT</span>
<span class="material-symbols-outlined transform group-hover:translate-x-2 transition-transform duration-300">arrow_forward</span>
</button>
</div>
</aside>
</body></html>
